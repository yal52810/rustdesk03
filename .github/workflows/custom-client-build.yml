name: Custom Client Build (Win Release + Beta)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason'
        required: false
        default: 'manual'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-windows:
    name: ${{ matrix.name }}
    needs: [generate-bridge]
    runs-on: windows-2022
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: win64-release
            target: x86_64-pc-windows-msvc
            flutter-arch: x64
            cargo-features: ""
            dart-defines: ""
          - name: win64-beta
            target: x86_64-pc-windows-msvc
            flutter-arch: x64
            cargo-features: "--features beta-locked"
            dart-defines: "--dart-define=BETA_LOCKED=true"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Build Flutter
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release ${{ matrix.dart-defines }}

      - name: Build Rust
        run: |
          cargo build --release --target ${{ matrix.target }} ${{ matrix.cargo-features }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          ARTIFACT_NAME="rustdesk-${{ matrix.name }}"
          cp -r "flutter/build/windows/${{ matrix.flutter-arch }}/runner/Release/"* dist/
          cp "target/${{ matrix.target }}/release/rustdesk.exe" dist/
          cd dist
          7z a "../${ARTIFACT_NAME}.zip" *
          cd ..
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip
          retention-days: 30
