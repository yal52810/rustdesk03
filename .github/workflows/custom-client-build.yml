name: Custom Client Build (Win Release + Beta)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_beta:
        description: 'Build beta (password-locked) version'
        type: boolean
        default: true
      build_release:
        description: 'Build release (no password) version'
        type: boolean
        default: true

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-windows:
    name: ${{ matrix.name }}
    needs: [generate-bridge]
    runs-on: self-hosted
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: win64-release
            arch: x86_64
            target: x86_64-pc-windows-msvc
            flutter-arch: x64
            variant: release
            cargo-features: ""
            dart-defines: ""
          - name: win64-beta
            arch: x86_64
            target: x86_64-pc-windows-msvc
            flutter-arch: x64
            variant: beta
            cargo-features: "--features beta-locked"
            dart-defines: "--dart-define=BETA_LOCKED=true"
          - name: win32-release
            arch: i686
            target: i686-pc-windows-msvc
            flutter-arch: x86
            variant: release
            cargo-features: ""
            dart-defines: ""
          - name: win32-beta
            arch: i686
            target: i686-pc-windows-msvc
            flutter-arch: x86
            variant: beta
            cargo-features: "--features beta-locked"
            dart-defines: "--dart-define=BETA_LOCKED=true"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Build Flutter
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release ${{ matrix.dart-defines }}

      - name: Build Rust
        run: |
          cargo build --release --target ${{ matrix.target }} ${{ matrix.cargo-features }}

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          ARTIFACT_NAME="rustdesk-${{ matrix.name }}"
          cp -r "flutter/build/windows/${{ matrix.flutter-arch }}/runner/Release/"* dist/
          cp "target/${{ matrix.target }}/release/rustdesk.exe" dist/
          cd dist
          7z a "../${ARTIFACT_NAME}.zip" *
          cd ..
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip
          retention-days: 30
